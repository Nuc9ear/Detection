# VisDrone after conversion to YOLO. Keep the original 10-class ordering during
# training; the application displays only the eight transport classes.
path: ../data/VisDrone
train: images/train
val: images/val
test: images/test
names:
  0: pedestrian
  1: people
  2: bicycle
  3: car
  4: van
  5: truck
  6: tricycle
  7: awning-tricycle
  8: bus
  9: motor

