services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      ALLOW_PRETRAINED_FALLBACK: "true"
    volumes:
      - ./models:/app/models:ro
    ports:
      - "8000:8000"

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    environment:
      POWERGUARD_API_URL: http://api:8000
    depends_on:
      - api
    ports:
      - "8501:8501"

